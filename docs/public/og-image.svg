<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#1B1F25"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0D10" stop-opacity="0"/>
      <stop offset="1" stop-color="#0B0D10" stop-opacity="1"/>
    </linearGradient>
    <style>
      .title { font: 700 96px 'Inter','SF Pro Display',system-ui,sans-serif; fill: #E7E9EC; letter-spacing: -0.03em; }
      .accent { fill: #8B5CF6; }
      .sub { font: 400 28px 'Inter',system-ui,sans-serif; fill: #A8ADB5; letter-spacing: -0.005em; }
      .mono { font: 500 18px 'JetBrains Mono',ui-monospace,monospace; fill: #A8ADB5; letter-spacing: 0.02em; }
      .tag { font: 600 14px 'JetBrains Mono',ui-monospace,monospace; fill: #8B5CF6; letter-spacing: 0.12em; text-transform: uppercase; }
      .footer { font: 500 16px 'JetBrains Mono',ui-monospace,monospace; fill: #6B7178; letter-spacing: 0.04em; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0D10"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.7"/>
  <rect width="1200" height="630" fill="url(#fade)" opacity="0.4"/>

  <!-- Violet corner accent -->
  <circle cx="1200" cy="0" r="400" fill="#8B5CF6" opacity="0.08"/>

  <!-- Logo mark (ms monogram) -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="12" fill="#8B5CF6"/>
    <text x="28" y="40" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="30" fill="#FFFFFF">ms</text>
  </g>

  <!-- Eyebrow tag -->
  <text x="80" y="225" class="tag">MongoDB migrations</text>

  <!-- Headline -->
  <text x="80" y="320" class="title">MongoDB migrations</text>
  <text x="80" y="420" class="title accent">with receipts.</text>

  <!-- Sub-headline -->
  <text x="80" y="475" class="sub">Dry-run. Stored logs. File-hash drift detection.</text>
  <text x="80" y="512" class="sub">TypeScript-native. Node 24+. ESM only.</text>

  <!-- Footer: install command -->
  <g transform="translate(80, 560)">
    <rect x="-12" y="-26" width="540" height="48" rx="8" fill="#13171C" stroke="#1B1F25" stroke-width="1"/>
    <text x="8" y="5" class="mono" fill="#8B5CF6" font-weight="700">$</text>
    <text x="30" y="5" class="mono" fill="#E7E9EC">pnpm add mongoshift mongodb</text>
  </g>

  <!-- Right column: migration file preview -->
  <g transform="translate(700, 100)">
    <rect width="440" height="420" rx="10" fill="#0A0C0F" stroke="#1E2228" stroke-width="1"/>
    <rect width="440" height="40" rx="10" fill="#13171C"/>
    <rect y="30" width="440" height="10" fill="#13171C"/>
    <circle cx="18" cy="20" r="5" fill="#E84E3D"/>
    <circle cx="36" cy="20" r="5" fill="#F5BE40"/>
    <circle cx="54" cy="20" r="5" fill="#5ECC58"/>
    <text x="220" y="25" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="12" fill="#9CA3AF">20260405-add_users.ts</text>
    <g font-family="JetBrains Mono,monospace" font-size="14" transform="translate(20, 70)">
      <text y="0"><tspan fill="#CB7676">import</tspan> <tspan fill="#666">{</tspan> <tspan fill="#5DA994">Db</tspan><tspan fill="#666">,</tspan> <tspan fill="#5DA994">MongoClient</tspan> <tspan fill="#666">}</tspan> <tspan fill="#CB7676">from</tspan> <tspan fill="#C98A7D">"mongodb"</tspan><tspan fill="#666">;</tspan></text>
      <text y="26"><tspan fill="#CB7676">import</tspan> <tspan fill="#666">{</tspan> <tspan fill="#5DA994">MigrationContext</tspan> <tspan fill="#666">}</tspan> <tspan fill="#CB7676">from</tspan> <tspan fill="#C98A7D">"mongoshift"</tspan><tspan fill="#666">;</tspan></text>
      <text y="78"><tspan fill="#CB7676">export</tspan> <tspan fill="#CB7676">const</tspan> <tspan fill="#80A665">up</tspan> <tspan fill="#CB7676">=</tspan> <tspan fill="#CB7676">async</tspan> <tspan fill="#666">(</tspan></text>
      <text y="104">  <tspan fill="#BD976A">db</tspan><tspan fill="#666">:</tspan> <tspan fill="#5DA994">Db</tspan><tspan fill="#666">,</tspan></text>
      <text y="130">  <tspan fill="#BD976A">client</tspan><tspan fill="#666">:</tspan> <tspan fill="#5DA994">MongoClient</tspan><tspan fill="#666">,</tspan></text>
      <text y="156">  <tspan fill="#BD976A">ctx</tspan><tspan fill="#666">:</tspan> <tspan fill="#5DA994">MigrationContext</tspan><tspan fill="#666">,</tspan></text>
      <text y="182"><tspan fill="#666">)</tspan> <tspan fill="#CB7676">=&gt;</tspan> <tspan fill="#666">{</tspan></text>
      <text y="208">  <tspan fill="#BD976A">ctx</tspan><tspan fill="#666">.</tspan><tspan fill="#B8A965">logger</tspan><tspan fill="#666">.</tspan><tspan fill="#80A665">log</tspan><tspan fill="#666">(</tspan><tspan fill="#C98A7D">"creating users"</tspan><tspan fill="#666">);</tspan></text>
      <text y="234">  <tspan fill="#CB7676">if</tspan> <tspan fill="#666">(</tspan><tspan fill="#BD976A">ctx</tspan><tspan fill="#666">.</tspan><tspan fill="#B8A965">dryRun</tspan><tspan fill="#666">)</tspan> <tspan fill="#CB7676">return</tspan><tspan fill="#666">;</tspan></text>
      <text y="260">  <tspan fill="#CB7676">await</tspan> <tspan fill="#BD976A">db</tspan><tspan fill="#666">.</tspan><tspan fill="#80A665">createCollection</tspan><tspan fill="#666">(</tspan><tspan fill="#C98A7D">"users"</tspan><tspan fill="#666">);</tspan></text>
      <text y="286"><tspan fill="#666">};</tspan></text>
    </g>
  </g>
</svg>
